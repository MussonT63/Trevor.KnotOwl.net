  <link rel="stylesheet" href="/hamburger-menu/index.css">
  <title>Hamburger Menu</title>

<body>
  <header>
    <nav class="navbar">
      <div>
        <a href="/hamburger-menu/" class="nav-branding"><img alt="wbOwl" src="/favicon.ico"></a>
      </div>
      <div>
        <h1>Chief Okemos District<br>
        Advancement</h1>
      </div>
      <div>
        <!-- Hamburger button using semantic HTML -->
         <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
	   <span class="bar">&nbsp;</span> 
	   <span class="bar">&nbsp;</span> 
	   <span class="bar">&nbsp;</span>
	 </button>
        <ul class="nav-menu" id="nav-menu">
          <li class="nav-item"> <a href="/hamburger-menu/"           class="nav-link">Home</a> </li>
          <li class="nav-item"> <a href="/hamburger-menu/eagle/"     class="nav-link">Eagle</a> </li>

        </ul>

    </nav>
  </header>
  <script language="JavaScript" type="text/javascript" src="./location.js"></script>
  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
      // Toggle the 'active' class on both the hamburger and the menu
      hamburger.classList.toggle('active');
      navMenu.classList.toggle('active');

      // Toggle the aria-expanded attribute for accessibility
      const isExpanded = hamburger.getAttribute('aria-expanded') === 'true' || false;
      hamburger.setAttribute('aria-expanded', !isExpanded);
    });
  </script>
